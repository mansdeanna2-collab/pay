<style>
.van-popup--center {
    width: 100%;
    height: 100%;
    text-align: center;
    line-height: 300px;
    max-width: 100%;
}
.van-popup--center {
    top: 50%;
    left: 0;
    right: 0;
    width: -webkit-fit-content;
    width: fit-content;
    max-width: calc(100vw - var(--van-padding-md)* 2);
    margin: 0 auto;
    transform: translateY(-50%);
}
.van-popup {
    position: fixed;
    max-height: 100%;
    overflow-y: auto;
    box-sizing: border-box;
    background: var(--van-popup-background);
    transition: var(--van-popup-transition);
    -webkit-overflow-scrolling: touch;
}
.open {
    padding-top: 30px;
}

    justify-content: center;
    width: 100%;
    align-items: center;
    line-height: 40px;
    display: flex;
}
.open h1 span {
    margin-right: 10px;
    border: 1px #eee solid;
    width: 20px;
    height: 20px;
    line-height: 18px;
    border-radius: 50%;
    background-color: #48e9e9;
    color: #fff;
    font-size: 12px;
    font-style: italic;
}
.open h1 img {
    width: 20px;
    margin: 0 10px;
}
.arrow {
    position: absolute;
    line-height: 0;
    right: 0;
    top: 10px;
}
.arrow img {
    width: 50px;
}
</style>
