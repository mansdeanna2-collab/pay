<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>正在获取支付链接</title>
    <link rel="preload" href="__PAY__/pay/glass/fonts/remixicon.woff2" as="font" type="font/woff2" crossorigin>
    <link href="__PAY__/pay/glass/css/remixicon.css" rel="stylesheet">
    <script src="__PAY__/pay/glass/js/tailwindcss.js"></script>
    <script type="text/javascript" src="__PAY__/css/wechat/jquery.min.js"></script>
    <script type="text/javascript" src="__PAY__/layer/layer.js"></script>
    <script src="https://gw.alipayobjects.com/as/g/h5-lib/alipayjsapi/3.1.1/alipayjsapi.inc.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body {
            touch-action: pan-x pan-y;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a2035;
            padding: 16px;
        }
        .pay-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }
        .pay-card-header {
            padding: 24px 28px 20px;
            border-bottom: 1px solid #f0f2f7;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
            flex-shrink: 0;
        }
        .header-icon i { color: #fff; font-size: 20px; }
        .header-title { font-size: 16px; font-weight: 700; color: #1a2035; }
        .header-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }

        .pay-card-body { padding: 32px 28px; }

        /* 加载动画区 */
        .loading-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .spinner-ring {
            width: 72px;
            height: 72px;
            position: relative;
        }
        .spinner-ring::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid #e0e7ff;
            border-top-color: #6366f1;
            animation: spin 0.8s linear infinite;
        }
        .spinner-ring-inner {
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #eef0fd, #e0e7ff);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .spinner-ring-inner i { font-size: 22px; color: #6366f1; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-title { font-size: 17px; font-weight: 700; color: #1a2035; text-align: center; }
        .loading-desc { font-size: 13px; color: #94a3b8; text-align: center; line-height: 1.6; }

        /* 倒计时 */
        .countdown-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f4f6fb;
            border: 1px solid #e8ecf4;
            border-radius: 12px;
            padding: 10px 20px;
        }
        .countdown-label { font-size: 12px; color: #94a3b8; }
        .countdown-num { font-size: 22px; font-weight: 700; color: #6366f1; font-variant-numeric: tabular-nums; min-width: 1.6em; text-align: center; }
        .countdown-unit { font-size: 12px; color: #94a3b8; }

        /* 错误状态 */
        .error-wrap {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .error-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #fee2e2;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-icon i { font-size: 28px; color: #ef4444; }
        .error-title { font-size: 16px; font-weight: 700; color: #1a2035; text-align: center; }
        .error-msg { font-size: 13px; color: #94a3b8; text-align: center; }

        /* 底部 */
        .pay-card-footer { padding: 0 28px 24px; }
        .order-num-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 14px;
            padding: 10px 14px;
            background: #f8f9fc;
            border-radius: 10px;
            border: 1px solid #eef0f6;
        }
        .order-num-row i { font-size: 13px; color: #b0bac9; }
        .order-num-text { font-size: 11px; color: #b0bac9; font-family: monospace; letter-spacing: 0.5px; }

        .btn-cancel {
            width: 100%;
            height: 48px;
            border-radius: 12px;
            border: 1px solid #e8ecf4;
            background: #fff;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-cancel:hover { background: #f4f6fb; color: #1a2035; border-color: #d1d5db; }
        .btn-cancel:active { transform: scale(0.98); }
        .btn-cancel i { font-size: 15px; }
    </style>
</head>
<body>

    <div class="pay-card">

        <!-- 头部 -->
        <div class="pay-card-header">
            <div class="header-icon">
                <i class="ri-shield-check-line"></i>
            </div>
            <div>
                <div class="header-title">正在获取支付链接</div>
                <div class="header-sub">请稍候，系统正在处理您的订单</div>
            </div>
        </div>

        <!-- 主体 -->
        <div class="pay-card-body">

            <!-- 加载状态 -->
            <div id="loading-state" class="loading-wrap">
                <div class="spinner-ring">
                    <div class="spinner-ring-inner">
                        <i class="ri-shield-check-line"></i>
                    </div>
                </div>
                <div>
                    <div class="loading-title">正在获取支付链接</div>
                    <div class="loading-desc" style="margin-top:6px;">请勿刷新或关闭页面</div>
                </div>
                <div class="countdown-box">
                    <span class="countdown-label">剩余等待</span>
                    <span class="countdown-num" id="countdown">60</span>
                    <span class="countdown-unit">秒</span>
                </div>
            </div>

            <!-- 失败状态 -->
            <div id="error-state" class="error-wrap">
                <div class="error-icon">
                    <i class="ri-close-circle-line"></i>
                </div>
                <div class="error-title" id="error-title">获取支付链接失败</div>
                <div class="error-msg" id="error-msg">请返回重新发起支付</div>
            </div>

        </div>

        <!-- 底部 -->
        <div class="pay-card-footer">
            <div class="order-num-row">
                <i class="ri-receipt-line"></i>
                <span class="order-num-text">订单号：{$data.order_num}</span>
            </div>
            <button class="btn-cancel" onclick="cancelPayment()">
                <i class="ri-arrow-left-line"></i>
                <span>取消并返回</span>
            </button>
        </div>

    </div>

    <script>
        var orderNum   = '{$data.order_num}';
        var refer      = '{$data.refer}';
        var paySmsSet  = {$pay_smg_set|default=0};
        var maxSeconds = 60;

        var remaining  = maxSeconds;
        var pollTimer  = null;
        var countTimer = null;

        function startCountdown() {
            var el = document.getElementById('countdown');
            el.textContent = remaining;
            countTimer = setInterval(function () {
                remaining--;
                el.textContent = remaining;
                if (remaining <= 0) {
                    clearInterval(countTimer);
                    showError('获取支付链接超时', '请返回重新发起支付');
                }
            }, 1000);
        }

        function showError(title, msg) {
            if (pollTimer) clearInterval(pollTimer);
            document.getElementById('loading-state').style.display = 'none';
            var errEl = document.getElementById('error-state');
            errEl.style.display = 'flex';
            document.getElementById('error-title').textContent = title;
            document.getElementById('error-msg').textContent   = msg;
        }

        function cancelPayment() {
            if (pollTimer)  clearInterval(pollTimer);
            if (countTimer) clearInterval(countTimer);
            window.location.href = refer;
        }

        function poll() {
            $.get('../pay/orderc?num=' + orderNum, function (result) {
                if (result.code == 200) {
                    clearInterval(pollTimer);
                    clearInterval(countTimer);
                    if (result.order_mb === 'js_alipay') {
                        if (window.ap && typeof window.ap.tradePay === 'function') {
                            window.ap.tradePay({ orderStr: result.msg }, function () {
                                window.location.href = refer;
                            });
                        } else {
                            layer.confirm('请在支付宝内打开本页面完成支付', { icon: 2, title: '温馨提示', btn: ['确认'] }, function () {
                                window.location.href = refer;
                            });
                        }
                    } else if (result.order_mb === 'wangyi') {
                        window.location.reload();
                    } else {
                        window.location.href = '/?orderid=' + orderNum;
                    }
                } else if (result.code == 1001) {
                    clearInterval(pollTimer);
                    clearInterval(countTimer);
                    var errMsg = result.msg || '系统繁忙，请重新提交';
                    if (paySmsSet == 1) {
                        layer.confirm(errMsg, { icon: 2, title: '拉单失败', btn: ['确认'] }, function () {
                            window.location.href = refer;
                        });
                    } else {
                        showError('拉单失败', errMsg);
                    }
                }
            }, 'json');
        }

        window.onload = function () {
            startCountdown();
            pollTimer = setInterval(poll, 1500);
        };

        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1 && e.cancelable) e.preventDefault();
        }, { passive: false });
        document.addEventListener('wheel', function(e) {
            if (e.ctrlKey) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
